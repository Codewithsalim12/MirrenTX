<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="30%" stop-color="#8B5CF6" />
      <stop offset="60%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F1F5F9" />
    </linearGradient>
  </defs>
  
  <!-- Main Background Circle -->
  <circle cx="50" cy="50" r="47" fill="url(#bgGradient)" />
  
  <!-- Event/Rental Icon (Tent) -->
  <g fill="url(#iconGradient)">
    <path d="M25 70 L50 25 L75 70 Z" opacity="0.9" />
    <path d="M25 70 L50 25 L75 70 L70 70 L50 35 L30 70 Z" fill="rgba(255,255,240,0.4)" />
    
    <!-- Center Pole -->
    <path d="M48.5 25 L51.5 25 L51.5 70 L48.5 70 Z" fill="rgba(255,255,255,0.7)" />
    
    <!-- Base -->
    <ellipse cx="50" cy="70" rx="25" ry="3" fill="rgba(255,255,255,0.6)" />
    
    <!-- Decorative Accents -->
    <circle cx="35" cy="48" r="1.5" fill="rgba(255,255,255,0.8)" />
    <circle cx="65" cy="48" r="1.5" fill="rgba(255,255,255,0.8)" />
    
    <!-- Top Flag -->
    <path d="M50 25 L58 20 L66 25 L58 30 Z" fill="#10B981" opacity="0.9" />
    <circle cx="50" cy="25" r="2.5" fill="#ffffff" />
  </g>
</svg>
